<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Reader — Preview</title>
<link rel="stylesheet" href="reader.css">
<script>
/* PREVIEW-ONLY shim: provides a localStorage-free, in-memory `browser.storage`
   so reader.js runs outside the extension. Seeded with demo data.
   This file is NOT packaged by build.ps1. */
(function () {
  const A1 = {
    url: "https://example.com/why-a-reader",
    title: "The case for a quiet reader",
    synopsis: "A good reader strips the page down to the article itself, remembers what you read, and stays out of the way so the reading becomes effortless.",
    timestamp: Date.now() - 3600_000,
    read: false,
    pinned: false,
    highlights: [
      { id: "h1", block: 0, start: 0, end: 18, text: "Reading on the web", color: "#ffe066", note: "Exactly the problem this tool solves." },
      { id: "h2", block: 2, start: 14, end: 34, text: "strips the page down", color: "#8ce99a", note: "" },
    ],
    blocks: [
      ["p", "Reading on the web is noisy. Pop-ups, cookie banners, autoplaying video, and three newsletter prompts stand between you and the words you actually came for."],
      ["h", "Why a reader matters"],
      ["p", "A good reader strips the page down to the article itself. No chrome, no ads, just text you can read without fighting the layout for every paragraph."],
      ["p", "It also remembers what you read. A local library means you can come back later, search for it, and pick up where you left off without hunting through browser history."],
      ["q", "The best interface is the one that disappears, leaving only the content behind."],
      ["h", "Highlights and notes"],
      ["li", "Select text to highlight it in one of four colours."],
      ["li", "Attach a note to any highlight and hover later to read it."],
      ["li", "Export everything to Markdown when you are done."],
      ["p", "These small touches add up. The point is not features for their own sake, but removing friction so the reading itself becomes effortless and even a little pleasant."],
      ["p", "Typography matters more than people think. A comfortable measure, generous line height, and a font you actually like can turn a chore into something you look forward to."],
      ["p", "Dark mode is not just an aesthetic. For late-night reading it genuinely reduces eye strain, and a choice of themes respects that everyone's eyes and rooms differ."],
      ["p", "So that is the philosophy: do less, but do it carefully. Strip the noise, keep the words, and stay out of the way."],
      ["p", "Extra paragraph one to make the article tall enough to scroll, so the progress bar, back-to-top button, and resume-position behaviour can all be exercised."],
      ["p", "Extra paragraph two. The quick brown fox jumps over the lazy dog, again and again, padding out the body so there is something to scroll through during testing."],
      ["p", "Extra paragraph three, closing things out with a final thought so the end of the article is reachable and the unread dot can clear on scroll."],
    ],
  };
  const A2 = {
    url: "https://example.com/second",
    title: "Testing the second entry",
    synopsis: "A short article to verify the library list, pinning, sorting, and the active-item colour.",
    timestamp: Date.now() - 86_400_000,
    read: true,
    pinned: true,
    highlights: [],
    blocks: [
      ["p", "A short note to test the second library entry, pinning, and sorting. It is intentionally brief so the page does not scroll much."],
      ["p", "Two articles are enough to verify the library list, search, sort order, and the active-item highlight colour."],
    ],
  };

  const A3 = {
    url: "https://example.com/in-progress",
    title: "An article left half-read",
    synopsis: "Started but not finished — should still show Unread until you reach the end.",
    timestamp: Date.now() - 7200_000,
    read: false,
    pinned: false,
    scrollY: 320,
    highlights: [],
    blocks: [
      ["p", "This entry has a saved scroll position but is not marked read, so it represents the in-progress state."],
      ["p", "Its library pill should still read Unread, with status flipping to Read once it is marked finished."],
    ],
  };

  const store = { history: [A1, A3, A2] };

  window.browser = {
    storage: {
      local: {
        async get(keys) {
          if (keys == null) return { ...store };
          if (typeof keys === "string") return (keys in store) ? { [keys]: store[keys] } : {};
          if (Array.isArray(keys)) {
            const o = {};
            for (const k of keys) if (k in store) o[k] = store[k];
            return o;
          }
          const o = { ...keys };
          for (const k in keys) if (k in store) o[k] = store[k];
          return o;
        },
        async set(obj) { Object.assign(store, obj); },
        async remove(key) {
          const ks = Array.isArray(key) ? key : [key];
          for (const k of ks) delete store[k];
        },
      },
    },
    runtime: { getURL: (p) => p },
  };
})();
</script>
</head>
<body>
  <div id="progress" class="progress"></div>
  <header class="topbar">
    <span class="brand"><span class="brand-dot" aria-hidden="true"></span>  READER</span>
  </header>
  <div class="layout">
    <aside class="library">
      <div class="library-inner">
        <div class="lib-head">
          <h2>Library</h2>
          <button id="collapse-sidebar" class="lib-collapse" type="button" title="Hide library" aria-label="Hide library"><span class="lib-collapse-ico">‹</span></button>
        </div>
        <div class="lib-search-row">
          <input id="search" class="lib-search" type="search" placeholder="Search library…" autocomplete="off">
          <button id="lib-filter-btn" class="lib-filter-btn" type="button" title="Filter by status" aria-label="Filter by status" aria-expanded="false"><span class="lib-filter-ico">▾</span></button>
        </div>
        <div id="library"></div>
        <div class="lib-actions">
          <button id="clear-all" class="lib-clear">Clear all</button>
        </div>
      </div>
    </aside>
    <main class="article" id="article">
      <div class="empty">Loading…</div>
    </main>
  </div>

  <div class="reveal-zone" aria-hidden="true"></div>

  <button id="to-top" class="to-top" type="button" title="Back to top" aria-label="Back to top" hidden>↑</button>

  <div id="source-wrap" class="source-wrap" hidden>
    <a id="source" class="source" href="#" target="_blank" rel="noopener" aria-label="Open original"><span class="source-ico">↗</span></a>
    <div id="source-popup" class="source-popup" role="tooltip"></div>
  </div>

  <div class="dock" id="dock">
  <button id="export" class="dock-btn" type="button" title="Export as Markdown" aria-label="Export as Markdown"><span class="dock-ico">⬇</span></button>
  <button id="appearance" class="dock-btn" type="button" title="Settings" aria-label="Settings"><span class="dock-ico">⚙</span></button>
  <div class="help" id="help">
    <div class="help-panel" role="dialog" aria-label="How to use Reader">
      <h3>How to use Reader</h3>
      <ul>
        <li><b>Read a page</b> — on any article, click the Reader toolbar icon, then <i>Read this page</i>.</li>
        <li><b>Library</b> — saved articles sit on the left.</li>
        <li><b>Settings</b> — the <i>⚙</i> button changes theme, transition, font, size, width, sort, and sidebar mode.</li>
      </ul>
    </div>
    <button class="help-btn dock-btn" type="button" aria-label="Help"><span class="dock-ico">?</span></button>
  </div>
  </div>

  <script src="extractor.js"></script>
  <script src="importers.js"></script>
  <script src="reader.js"></script>
</body>
</html>
